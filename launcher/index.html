<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quick Login DELIMa</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --paper: #FBF4E6;
    --ink: #2A2A35;
    --ink-soft: #6E6A5E;
    --card: #FFFFFF;
    --go: #69DB7C;
    --focus: #4CC9F0;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: "Fredoka", "Segoe UI", "Microsoft YaHei", "PingFang SC", system-ui, sans-serif;
    color: var(--ink);
    background:
      radial-gradient(rgba(42,42,53,.06) 1.6px, transparent 1.6px) 0 0 / 26px 26px,
      var(--paper);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 28px 20px 16px;
  }

  /* ---------- kepala ---------- */
  .badge {
    display: inline-block;
    background: var(--ink);
    color: var(--paper);
    font-weight: 600;
    font-size: .8rem;
    letter-spacing: .18em;
    padding: 6px 14px;
    border-radius: 999px;
    transform: rotate(-2deg);
    margin-bottom: 14px;
  }
  header { text-align: center; margin-bottom: 26px; }
  header h1 {
    font-size: clamp(1.7rem, 4.5vw, 2.6rem);
    font-weight: 700;
    line-height: 1.15;
  }
  header h1 .zh { color: var(--ink-soft); font-size: .62em; font-weight: 600; display: block; margin-top: 4px; }
  header h1:focus { outline: none; }  /* tajuk difokus secara program semasa tukar langkah */

  main { width: 100%; max-width: 980px; flex: 1; }
  .hidden { display: none !important; }

  /* ---------- asas butang ---------- */
  button.tile, #btn-back, #btn-back-tahap, .huruf {
    font-family: inherit;
    color: var(--ink);
    border: 2.5px solid var(--ink);
    cursor: pointer;
    transition: transform .12s, box-shadow .12s;
  }
  button.tile {
    background: var(--card);
    border-radius: 18px;
    box-shadow: 5px 5px 0 var(--ink);
    text-align: left;
    padding: 16px 18px;
    opacity: 0;
    animation: pop .34s cubic-bezier(.34,1.56,.64,1) forwards;
    animation-delay: calc(var(--i) * 24ms);
  }
  button.tile:hover  { transform: translate(-2px,-3px) rotate(-.4deg); box-shadow: 8px 9px 0 var(--ink); }
  button.tile:active { transform: translate(3px,4px); box-shadow: 1px 1px 0 var(--ink); }
  button.tile:focus-visible, #btn-back:focus-visible, #btn-back-tahap:focus-visible, .huruf:focus-visible, #search:focus-visible {
    outline: 4px solid var(--focus);
    outline-offset: 3px;
  }
  @keyframes pop {
    from { opacity: 0; transform: scale(.82) translateY(10px); }
    to   { opacity: 1; transform: scale(1)   translateY(0); }
  }

  /* ---------- langkah 0 & 1: grid tahap / kelas ---------- */
  #grid-kelas, #grid-tahap {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
    gap: 18px;
  }
  .kelas-tile {
    min-height: 128px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    background: var(--tile, var(--card));
  }
  .kelas-tile .big { font-size: 2.9rem; font-weight: 700; line-height: 1; }
  .kelas-tile .label { font-weight: 600; font-size: 1.12rem; margin-top: 10px; }

  /* ---------- langkah 2: senarai nama ---------- */
  .toolbar {
    display: flex;
    gap: 14px;
    align-items: center;
    flex-wrap: wrap;
    margin-bottom: 22px;
  }
  #btn-back, #btn-back-tahap {
    font-weight: 600;
    font-size: 1.05rem;
    background: var(--card);
    border-radius: 999px;
    box-shadow: 4px 4px 0 var(--ink);
    padding: 10px 20px;
  }
  #btn-back:hover, #btn-back-tahap:hover   { transform: translate(-1px,-2px); box-shadow: 6px 7px 0 var(--ink); }
  #btn-back:active, #btn-back-tahap:active { transform: translate(2px,3px);  box-shadow: 1px 1px 0 var(--ink); }
  .kelas-chip {
    flex: 1;
    min-width: 160px;
    border: 2.5px solid var(--ink);
    border-radius: 14px;
    box-shadow: 4px 4px 0 var(--ink);
    padding: 10px 18px;
    font-weight: 700;
    font-size: 1.3rem;
  }
  #search {
    font-family: inherit;
    font-size: 1rem;
    color: var(--ink);
    background: var(--card);
    border: 2.5px solid var(--ink);
    border-radius: 999px;
    padding: 9px 16px;
    flex: 1 1 180px;
    min-width: 150px;
    max-width: 260px;
    box-shadow: 4px 4px 0 var(--ink);
  }
  #search::placeholder { color: var(--ink-soft); }

  .nama-layout {
    display: flex;
    gap: 18px;
    align-items: flex-start;
    justify-content: center;
  }

  /* rel huruf A-Z */
  #rail {
    position: sticky;
    top: 14px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    flex: none;
  }
  .huruf {
    width: 44px; height: 44px;
    font-size: 1.05rem;
    font-weight: 700;
    background: var(--card);
    border-radius: 12px;
    box-shadow: 3px 3px 0 var(--ink);
    display: flex; align-items: center; justify-content: center;
  }
  .huruf:hover  { transform: translate(-1px,-2px); box-shadow: 5px 5px 0 var(--ink); }
  .huruf:active { transform: translate(2px,2px); box-shadow: 1px 1px 0 var(--ink); }
  .huruf.dim { opacity: .25; pointer-events: none; }

  /* senarai */
  #senarai { flex: 1; max-width: 640px; min-width: 0; }
  .huruf-header {
    font-weight: 700;
    font-size: 1.3rem;
    color: var(--ink-soft);
    padding: 14px 6px 8px;
    scroll-margin-top: 10px;
  }
  .nama-tile {
    width: 100%;
    min-height: 64px;
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 10px 16px;
    margin-bottom: 10px;
    border-radius: 16px;
  }
  .avatar {
    flex: none;
    width: 46px; height: 46px;
    border-radius: 50%;
    background: var(--tile);
    border: 2.5px solid var(--ink);
    display: flex; align-items: center; justify-content: center;
    font-size: 1.35rem;
    font-weight: 700;
  }
  .nm { font-weight: 600; font-size: 1.12rem; line-height: 1.3; word-break: break-word; }

  .kosong {
    border: 2.5px dashed var(--ink-soft);
    border-radius: 18px;
    color: var(--ink-soft);
    font-weight: 600;
    font-size: 1.1rem;
    text-align: center;
    padding: 36px 20px;
  }

  /* ---------- langkah 3: sahkan ---------- */
  #view-sah { display: flex; justify-content: center; }
  .sah-kad {
    background: var(--card);
    border: 2.5px solid var(--ink);
    border-radius: 24px;
    box-shadow: 7px 7px 0 var(--ink);
    padding: 40px 36px 32px;
    max-width: 560px;
    width: 100%;
    text-align: center;
    animation: pop .34s cubic-bezier(.34,1.56,.64,1);
  }
  .sah-avatar {
    width: 104px; height: 104px;
    border-radius: 50%;
    background: var(--tile);
    border: 3px solid var(--ink);
    box-shadow: 4px 4px 0 var(--ink);
    display: flex; align-items: center; justify-content: center;
    font-size: 3.1rem;
    font-weight: 700;
    margin: 0 auto 20px;
  }
  #sah-nama {
    font-size: clamp(1.5rem, 4vw, 2.1rem);
    font-weight: 700;
    line-height: 1.2;
    margin-bottom: 6px;
  }
  #sah-kelas { color: var(--ink-soft); font-weight: 600; font-size: 1.05rem; margin-bottom: 28px; }
  .sah-btn {
    font-family: inherit;
    color: var(--ink);
    border: 2.5px solid var(--ink);
    border-radius: 999px;
    box-shadow: 5px 5px 0 var(--ink);
    cursor: pointer;
    font-weight: 700;
    font-size: 1.2rem;
    padding: 16px 30px;
    margin: 6px 8px;
    transition: transform .12s, box-shadow .12s;
  }
  .sah-btn:hover  { transform: translate(-2px,-3px); box-shadow: 8px 9px 0 var(--ink); }
  .sah-btn:active { transform: translate(3px,4px); box-shadow: 1px 1px 0 var(--ink); }
  .sah-btn:focus-visible { outline: 4px solid var(--focus); outline-offset: 3px; }
  #btn-ya { background: var(--go); }
  #btn-bukan { background: var(--card); font-weight: 600; }
  .sah-petua { margin-top: 22px; color: var(--ink-soft); font-size: .92rem; font-weight: 500; }

  footer { margin-top: 28px; color: var(--ink-soft); font-size: .82rem; font-weight: 500; }

  @media (max-width: 560px) {
    #rail { display: none; }
  }
  @media (prefers-reduced-motion: reduce) {
    button.tile, .sah-kad { animation: none; opacity: 1; }
    button.tile, #btn-back, #btn-back-tahap, .huruf, .sah-btn { transition: none; }
  }
</style>
</head>
<body>
<div class="badge">QUICK LOGIN</div>
<header>
  <h1 id="tajuk" tabindex="-1">Pilih kelas kamu!<span class="zh">选你的班级</span></h1>
</header>

<main>
  <!-- langkah 0 (sekolah besar sahaja) -->
  <section id="view-tahap" class="hidden">
    <div id="grid-tahap"></div>
  </section>

  <!-- langkah 1 -->
  <section id="view-kelas">
    <div class="toolbar hidden" id="bar-tahap">
      <button id="btn-back-tahap">← Kembali 返回</button>
      <div class="kelas-chip" id="nama-tahap"></div>
    </div>
    <div id="grid-kelas"></div>
  </section>

  <!-- langkah 2 -->
  <section id="view-nama" class="hidden">
    <div class="toolbar">
      <button id="btn-back">← Kembali 返回</button>
      <div class="kelas-chip" id="nama-kelas"></div>
      <input id="search" type="search" aria-label="Cari nama 找名字" placeholder="Cari nama 找名字…">
    </div>
    <div class="nama-layout">
      <nav id="rail" aria-label="Indeks huruf"></nav>
      <div id="senarai"></div>
    </div>
    <div class="kosong hidden" id="kosong" aria-live="polite">Tiada nama dijumpai · 找不到这个名字</div>
  </section>

  <!-- langkah 3 -->
  <section id="view-sah" class="hidden">
    <div class="sah-kad">
      <div class="sah-avatar" id="sah-avatar" aria-hidden="true"></div>
      <div id="sah-nama"></div>
      <div id="sah-kelas"></div>
      <div>
        <button class="sah-btn" id="btn-ya">Ya, log masuk! 是我!</button>
        <button class="sah-btn" id="btn-bukan">Bukan saya 不是我</button>
      </div>
      <div class="sah-petua">Lepas ini, taip kata laluan kamu · 接下来输入你的密码</div>
    </div>
  </section>
</main>

<footer>Quick Login DELIMa · klik nama kamu, taip kata laluan sahaja</footer>

<script src="data/roster.js"></script>
<script>
(function () {
  var CONTINUE_URL = 'https://classroom.google.com';

  var WARNA = [
    '#FF8787', '#FFA94D', '#FFD43B', '#69DB7C', '#66D9E8',
    '#91A7FF', '#FAA2C1', '#FFC078', '#96F2D7', '#E599F7'
  ];

  var viewKelas = document.getElementById('view-kelas');
  var viewNama = document.getElementById('view-nama');
  var viewSah = document.getElementById('view-sah');
  var gridKelas = document.getElementById('grid-kelas');
  var senarai = document.getElementById('senarai');
  var rail = document.getElementById('rail');
  var namaKelas = document.getElementById('nama-kelas');
  var tajuk = document.getElementById('tajuk');
  var search = document.getElementById('search');
  var kosong = document.getElementById('kosong');
  var sahAvatar = document.getElementById('sah-avatar');
  var sahNama = document.getElementById('sah-nama');
  var sahKelas = document.getElementById('sah-kelas');

  var viewTahap = document.getElementById('view-tahap');
  var gridTahap = document.getElementById('grid-tahap');
  var barTahap = document.getElementById('bar-tahap');
  var namaTahap = document.getElementById('nama-tahap');

  var kelasSemasa = null;
  var muridSemasa = null;

  if (typeof window.ROSTER !== 'object' || window.ROSTER === null) {
    gridKelas.outerHTML = '<div class="kosong">Senarai murid tidak dijumpai (data/roster.js). ' +
      'Sila maklumkan kepada guru. 找不到名单文件，请通知老师。</div>';
    return;
  }

  var senaraiKelas = Object.keys(window.ROSTER);
  var kurangGerak = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  var AMBANG_DUA_ARAS = 12;
  var SUSUNAN = ['Prasekolah', 'Tahun 1', 'Tahun 2', 'Tahun 3', 'Tahun 4', 'Tahun 5',
    'Tahun 6', 'Peralihan', 'Tingkatan 1', 'Tingkatan 2', 'Tingkatan 3', 'Tingkatan 4',
    'Tingkatan 5', 'PPKI', 'Lain-lain'];

  function namaKumpulan(kelas) {
    var m;
    if ((m = kelas.match(/^tahun\s*(\d)/i))) return 'Tahun ' + m[1];
    if ((m = kelas.match(/^tingkatan\s*(\d)/i))) return 'Tingkatan ' + m[1];
    if (/^pra/i.test(kelas)) return 'Prasekolah';
    if (/^ppki/i.test(kelas)) return 'PPKI';
    if (/^peralihan/i.test(kelas)) return 'Peralihan';
    return 'Lain-lain';
  }

  var kumpulanKelas = {};
  senaraiKelas.forEach(function (kelas) {
    var k = namaKumpulan(kelas);
    (kumpulanKelas[k] = kumpulanKelas[k] || []).push(kelas);
  });
  var senaraiKumpulan = Object.keys(kumpulanKelas).sort(function (a, b) {
    return SUSUNAN.indexOf(a) - SUSUNAN.indexOf(b);
  });
  senaraiKumpulan.forEach(function (k) {
    kumpulanKelas[k].sort(function (a, b) {
      return a.localeCompare(b, undefined, { numeric: true });
    });
  });
  var duaAras = senaraiKelas.length > AMBANG_DUA_ARAS;
  var kumpulanSemasa = null;

  function warnaKelas(kelas) {
    return WARNA[senaraiKelas.indexOf(kelas) % WARNA.length];
  }

  function loginUrl(email) {
    return 'https://accounts.google.com/AccountChooser?Email=' +
      encodeURIComponent(email) + '&continue=' + encodeURIComponent(CONTINUE_URL);
  }

  function labelBesar(kelas) {
    var m = kelas.match(/\d+/);
    if (m) return m[0];
    var s = kelas.replace(/^PPKI\s*/i, '');
    return (s || kelas).charAt(0).toUpperCase();
  }

  function tunjuk(view, tajukMs, tajukZh) {
    [viewTahap, viewKelas, viewNama, viewSah].forEach(function (v) { v.classList.add('hidden'); });
    view.classList.remove('hidden');
    tajuk.innerHTML = tajukMs + '<span class="zh">' + tajukZh + '</span>';
    tajuk.focus();  // bawa fokus + umumkan langkah baru kepada pembaca skrin
  }

  function showTahap() {
    kumpulanSemasa = null;
    tunjuk(viewTahap, 'Pilih tahun / tingkatan!', '选你的年级');
  }

  function showKelas() {
    binaGridKelas(duaAras ? kumpulanKelas[kumpulanSemasa] : senaraiKelas);
    tunjuk(viewKelas, 'Pilih kelas kamu!', '选你的班级');
    search.value = '';
  }

  function binaGridKelas(senarai) {
    gridKelas.innerHTML = '';
    if (duaAras) {
      barTahap.classList.remove('hidden');
      namaTahap.textContent = kumpulanSemasa;
      namaTahap.style.background = WARNA[senaraiKumpulan.indexOf(kumpulanSemasa) % WARNA.length];
    }
    senarai.forEach(function (kelas, i) {
      var b = document.createElement('button');
      b.className = 'tile kelas-tile';
      b.style.setProperty('--tile', warnaKelas(kelas));
      b.style.setProperty('--i', i);
      var big = document.createElement('span');
      big.className = 'big';
      big.textContent = labelBesar(kelas);
      var label = document.createElement('span');
      label.className = 'label';
      label.textContent = kelas;
      b.appendChild(big);
      b.appendChild(label);
      b.addEventListener('click', function () { showNama(kelas); });
      gridKelas.appendChild(b);
    });
  }

  function binaGridTahap() {
    senaraiKumpulan.forEach(function (k, i) {
      var b = document.createElement('button');
      b.className = 'tile kelas-tile';
      b.style.setProperty('--tile', WARNA[i % WARNA.length]);
      b.style.setProperty('--i', i);
      var big = document.createElement('span');
      big.className = 'big';
      big.textContent = labelBesar(k);
      var label = document.createElement('span');
      label.className = 'label';
      label.textContent = k + ' · ' + kumpulanKelas[k].length + ' kelas';
      b.appendChild(big);
      b.appendChild(label);
      b.addEventListener('click', function () { kumpulanSemasa = k; showKelas(); });
      gridTahap.appendChild(b);
    });
  }

  // paparan awal — tanpa tunjuk() supaya fokus tidak dialih semasa muat
  if (duaAras) {
    binaGridTahap();
    viewKelas.classList.add('hidden');
    viewTahap.classList.remove('hidden');
    tajuk.innerHTML = 'Pilih tahun / tingkatan!<span class="zh">选你的年级</span>';
  } else {
    binaGridKelas(senaraiKelas);
  }

  document.getElementById('btn-back-tahap').addEventListener('click', showTahap);

  function showNama(kelas) {
    kelasSemasa = kelas;
    var warna = warnaKelas(kelas);
    namaKelas.textContent = kelas;
    namaKelas.style.background = warna;
    search.value = '';
    senarai.innerHTML = '';
    rail.innerHTML = '';
    kosong.classList.add('hidden');

    // kumpulkan ikut huruf pertama
    var kumpulan = {};
    window.ROSTER[kelas].forEach(function (murid) {
      var huruf = murid.nama.charAt(0).toUpperCase();
      (kumpulan[huruf] = kumpulan[huruf] || []).push(murid);
    });

    var idx = 0;
    Object.keys(kumpulan).sort().forEach(function (huruf) {
      var header = document.createElement('div');
      header.className = 'huruf-header';
      header.id = 'grp-' + huruf;
      header.textContent = huruf;
      senarai.appendChild(header);

      kumpulan[huruf].forEach(function (murid) {
        var b = document.createElement('button');
        b.className = 'tile nama-tile';
        b.style.setProperty('--i', Math.min(idx++, 24));
        var av = document.createElement('span');
        av.className = 'avatar';
        av.setAttribute('aria-hidden', 'true');
        av.style.background = warna;
        av.textContent = huruf;
        var nm = document.createElement('span');
        nm.className = 'nm';
        nm.textContent = murid.nama;
        b.appendChild(av);
        b.appendChild(nm);
        b.addEventListener('click', function () { showSah(murid); });
        senarai.appendChild(b);
      });

      var hb = document.createElement('button');
      hb.className = 'huruf';
      hb.textContent = huruf;
      hb.addEventListener('click', function () {
        document.getElementById('grp-' + huruf).scrollIntoView({
          behavior: kurangGerak ? 'auto' : 'smooth', block: 'start'
        });
      });
      rail.appendChild(hb);
    });

    tunjuk(viewNama, 'Cari nama kamu!', '找你的名字');
  }

  function showSah(murid) {
    muridSemasa = murid;
    var warna = warnaKelas(kelasSemasa);
    sahAvatar.style.background = warna;
    sahAvatar.textContent = murid.nama.charAt(0).toUpperCase();
    sahNama.textContent = murid.nama;
    sahKelas.textContent = kelasSemasa;
    tunjuk(viewSah, 'Betul ke ini kamu?', '这是你吗？');
    document.getElementById('btn-ya').focus();
  }

  document.getElementById('btn-back').addEventListener('click', showKelas);
  document.getElementById('btn-bukan').addEventListener('click', function () { showNama(kelasSemasa); });
  document.getElementById('btn-ya').addEventListener('click', function () {
    if (muridSemasa) window.location.href = loginUrl(muridSemasa.email);
  });

  search.addEventListener('input', function () {
    var q = search.value.trim().toLowerCase();
    var ada = 0;
    var nampak = {};
    Array.prototype.forEach.call(senarai.querySelectorAll('.nama-tile'), function (tile) {
      var padan = tile.textContent.toLowerCase().indexOf(q) >= 0;
      tile.style.display = padan ? '' : 'none';
      if (padan) {
        ada++;
        nampak[tile.querySelector('.avatar').textContent] = true;
      }
    });
    Array.prototype.forEach.call(senarai.querySelectorAll('.huruf-header'), function (h) {
      h.style.display = nampak[h.textContent] ? '' : 'none';
    });
    Array.prototype.forEach.call(rail.children, function (hb) {
      hb.classList.toggle('dim', !nampak[hb.textContent]);
    });
    kosong.classList.toggle('hidden', ada > 0);
  });
})();
</script>
</body>
</html>
